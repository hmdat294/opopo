<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPOPO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="bg-slate-100 text-slate-800">
    <div class="mx-auto max-w-6xl p-4">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold md:text-3xl">OPOPO</h1>
            </div>

            <div class="rounded border border-slate-200 bg-white p-3 shadow-sm">
                <div class="flex flex-wrap items-center gap-2">
                    <input id="customerNameInput" type="text" placeholder="Nhập tên"
                        class="w-full min-w-[220px] flex-1 rounded border border-slate-300 px-3 py-1 text-sm outline-none focus:border-blue-500">
                    <button id="addCustomerBtn" class="rounded bg-blue-500 px-2 py-1 text-sm font-medium text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                        </svg>
                    </button>
                    <button id="resetAllBtn" class="rounded bg-red-500 px-2 py-1 text-sm font-medium text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div id="customersContainer" class="mt-4"></div>
    </div>
    <script src="./js/data/state.js" defer></script>
    <script src="./js/services/optimizationService.js" defer></script>
    <script src="./js/controllers/customerController.js" defer></script>
    <script src="./js/ui/render.js" defer></script>
    <script src="./js/main.js" defer></script>
</body>

</html>
